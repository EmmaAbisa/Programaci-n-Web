<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 16 - Calculadora con Funciones Flecha</title>

    
    <link rel="stylesheet" href="css/EJERCICIO_16.css">

  
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <h1>Calculadora de Números</h1>

    
    <div class="calculadora">

       
        <input type="text" id="numero1" placeholder="Ingresa el primer número">
        <input type="text" id="numero2" placeholder="Ingresa el segundo número">

        
        <div class="botones">
            <button onclick="calcularOperacion('suma')">Sumar</button>
            <button onclick="calcularOperacion('resta')">Restar</button>
            <button onclick="calcularOperacion('multiplicacion')">Multiplicar</button>
            <button onclick="calcularOperacion('division')">Dividir</button>
        </div>

       
        <input type="text" id="resultado" readonly placeholder="Resultado">
    </div>

    <script src="js/EJERCICIO_16.js"></script>

</body>
</html>
