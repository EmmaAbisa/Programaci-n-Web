<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 13</title>
    <!-- CORRECCIÓN: Enlace completo y correcto para cargar la fuente Inter -->

    <link href="https://googleapis.com" rel="stylesheet">
    <!--Vinculación del archivo de estilos CSS-->
    <link rel="stylesheet" href="css/EJERCICIO_13.css">
</head>
<body>

    <div class="contenedor-formulario">
        <h1>Verificador de edad</h1>
        <p class="subtitulo">Verifica tu edad para votar.</p>

        <form id="form-conversor">
            <!-- Entrada: Kilometros -->
            <div class="grupo-formulario">
                <label for="EDAD">Tu edad</label>
                <input type="text" id="EDAD" placeholder="Ej: 100">
                <div id="error-EDAD" class="error-mensaje">Por favor, ingresa una edad válida.</div>
            </div>

            <!-- Salida: Grados Fahrenheit (Bloqueado) -->
            <div class="grupo-formulario">
                <label for="MAYOR">Verificacion</label>
                <input type="text" id="MAYOR" readonly placeholder="El resultado aparecerá aquí">
            </div>

            <!-- Botón de conversión -->
            <button type="button" id="btn-convertir" class="boton-enviar">Verificar</button>
        </form>
    </div>

    <!-- Vinculación del archivo lógico de JavaScript -->
    <script src="js/EJERCICIO_13.js"></script>
</body>
</html>
