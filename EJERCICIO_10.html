<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 10 - Conversor de Temperatura</title>
    <!-- CORRECCIÓN: Enlace completo y correcto para cargar la fuente Inter -->
    <link href="https://googleapis.com" rel="stylesheet">
    <!-- Vinculación del archivo de estilos CSS -->
    <link rel="stylesheet" href="css/EJERCICIO_10.css">
</head>
<body>

    <div class="contenedor-formulario">
        <h1>Conversor de Temperatura</h1>
        <p class="subtitulo">Transforma grados Celsius a Fahrenheit al instante.</p>

        <form id="form-conversor">
            <!-- Entrada: Grados Celsius -->
            <div class="grupo-formulario">
                <label for="celsius">Grados Celsius (°C)</label>
                <input type="text" id="celsius" placeholder="Ej: 25">
                <div id="error-celsius" class="error-mensaje">Por favor, ingresa un número válido.</div>
            </div>

            <!-- Salida: Grados Fahrenheit (Bloqueado) -->
            <div class="grupo-formulario">
                <label for="fahrenheit">Resultado en Fahrenheit (°F)</label>
                <input type="text" id="fahrenheit" readonly placeholder="El resultado aparecerá aquí">
            </div>

            <!-- Botón de conversión -->
            <button type="button" id="btn-convertir" class="boton-enviar">Convertir</button>
        </form>
    </div>

    <!-- Vinculación del archivo lógico de JavaScript -->
    <script src="js/EJERCICIO_10.js"></script>
</body>
</html>
